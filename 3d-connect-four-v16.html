<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立体四並べ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1008; overflow:hidden; font-family:sans-serif; }
canvas.gl { display:block; position:fixed; inset:0; z-index:1; }

/* ── MODE SELECT ── */
#mode-screen {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 38%, #2a1a06 0%, #0a0604 100%);
  overflow-y:auto; padding:16px 0 24px;
}
#mode-screen h1 { font-size:clamp(20px,5vw,32px); letter-spacing:.2em; color:#c87820;
  text-shadow:0 0 20px rgba(200,120,30,.4); margin-bottom:4px; font-weight:300; }
#mode-screen .sub { font-size:11px; letter-spacing:.25em; color:#4a3010; margin-bottom:24px; }
.mode-btn {
  width:270px; margin:5px 0; background:none; border:1px solid #3a2208;
  color:#c87820; padding:11px 16px; font-size:12px; letter-spacing:.08em;
  cursor:pointer; border-radius:6px; transition:all .2s; text-align:left;
  display:flex; align-items:center; gap:12px;
}
.mode-btn:hover { border-color:#c87820; background:rgba(200,120,30,.07); }
.mode-icon { font-size:22px; width:30px; text-align:center; flex-shrink:0; }
.mode-lbl span:last-child { font-size:10px; color:#6a4020; display:block; margin-top:2px; }
.char-card {
  width:270px; margin:5px 0; background:none; border:1px solid #3a2208;
  padding:10px 14px; border-radius:6px; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:12px;
}
.char-card:hover { border-color:#c87820; background:rgba(200,120,30,.07); }
.char-portrait-wrap canvas { border-radius:50%; border:2px solid #6a4a20; display:block; }
.char-info { display:flex; flex-direction:column; gap:3px; }
.char-name { font-size:13px; color:#d08828; letter-spacing:.08em; }
.char-lvl  { font-size:10px; color:#7a5030; }
.char-desc { font-size:10px; color:#5a3818; line-height:1.45; }

/* ── DICE OVERLAY ── */
#dice-overlay {
  position:fixed; inset:0; z-index:180;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(4,2,1,.9); backdrop-filter:blur(10px);
}
#dice-overlay.show { display:flex; }
#dice-title { font-size:13px; color:#5a3a10; letter-spacing:.18em; margin-bottom:24px; }
#dice-row { display:flex; gap:28px; align-items:center; margin-bottom:26px; }
.die {
  width:74px; height:74px; border-radius:14px;
  background:linear-gradient(135deg,#fff8f0,#ffe0c0);
  border:2px solid #c87820;
  display:flex; align-items:center; justify-content:center;
  font-size:40px; color:#1a1008;
  box-shadow:0 4px 20px rgba(200,120,30,.35);
  transition:transform .06s;
}
.die-label { font-size:10px; color:#5a3a10; text-align:center; margin-top:6px; letter-spacing:.08em; }
.die-wrap { display:flex; flex-direction:column; align-items:center; }
#dice-vs { color:#3a2010; font-size:18px; }
#dice-result { font-size:15px; color:#c8a060; letter-spacing:.1em; min-height:22px; margin-bottom:4px; }
#dice-sub    { font-size:11px; color:#5a3a10; letter-spacing:.08em; min-height:18px; margin-bottom:24px; }
#dice-go {
  display:none; background:none; border:1px solid #c87820;
  color:#c8a060; padding:11px 36px; font-size:13px; letter-spacing:.14em;
  cursor:pointer; border-radius:5px; transition:all .2s;
}
#dice-go:hover { background:rgba(200,120,30,.1); }

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 13px;
  background:linear-gradient(to bottom,rgba(6,3,1,.93),transparent);
  pointer-events:none;
}
.chip { display:flex; align-items:center; gap:6px; padding:4px 11px; border-radius:20px;
  border:1px solid transparent; font-size:11px; opacity:.28; transition:all .3s; }
.chip.on { opacity:1; border-color:currentColor; }
.chip.p1{color:#ffaa33} .chip.p2{color:#33ddff}
.chip.cpu1c{color:#aaffaa} .chip.cpu2c{color:#ffaaee} .chip.cpu3c{color:#aaaaff}
.cdot { width:7px; height:7px; border-radius:50%; }
.p1 .cdot{background:#ffaa33;box-shadow:0 0 5px #ffaa33}
.p2 .cdot{background:#33ddff;box-shadow:0 0 5px #33ddff}
.cpu1c .cdot{background:#aaffaa;box-shadow:0 0 5px #aaffaa}
.cpu2c .cdot{background:#ffaaee;box-shadow:0 0 5px #ffaaee}
.cpu3c .cdot{background:#aaaaff;box-shadow:0 0 5px #aaaaff}

/* ── CHARACTER BUBBLE ── */
#char-bubble { position:fixed; left:12px; bottom:100px; z-index:15;
  display:none; align-items:flex-end; gap:8px; pointer-events:none; }
#char-bubble.show { display:flex; }
#bubble-portrait canvas { border-radius:50%; border:2px solid #5a3a18; display:block; }
#char-speech { background:rgba(8,5,2,.96); border:1px solid #4a3020;
  border-radius:10px 10px 10px 2px; padding:7px 11px; font-size:11px;
  color:#c8a060; max-width:160px; line-height:1.5; letter-spacing:.03em;
  animation:fdin .25s ease; }
@keyframes fdin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}



/* ── CPU THINKING ── */
#thinking { position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
  z-index:10; display:none; background:rgba(8,5,2,.96); border:1px solid #2a4020;
  border-radius:8px; padding:7px 18px; font-size:11px; color:#aaffaa; letter-spacing:.1em; }
#thinking.show { display:block; }

/* ── SELECTION STATUS ── */
#sel-status {
  position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
  z-index:10; display:none;
  background:rgba(8,5,2,.92); border:1px solid #5a3a10;
  border-radius:8px; padding:7px 18px;
  font-size:12px; color:#c8a060; letter-spacing:.08em;
  white-space:nowrap; pointer-events:none;
}
#sel-status.show { display:block; }

/* ── BOTTOM TOOLBAR ── */
#toolbar {
  position:fixed; bottom:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:7px 10px 10px;
  background:linear-gradient(to top,rgba(6,3,1,.95),rgba(6,3,1,.7),transparent);
}
#toolbar button {
  background:rgba(14,8,2,.88); border:1px solid #3a2008; color:#7a5030;
  padding:6px 12px; font-size:11px; cursor:pointer; border-radius:5px;
  transition:all .15s; letter-spacing:.06em; white-space:nowrap;
}
#toolbar button:hover { border-color:#7a4820; color:#aa7040; }
#mbtn { font-size:14px; padding:6px 14px; color:#ffaa33; border-color:#6a4010; }
#mbtn.mute { color:#4a3010; border-color:#2a1808; }
#btnquit { color:#aa4020; border-color:#6a2010; }

/* ── QUIT CONFIRM ── */
#quit-overlay {
  position:fixed; inset:0; z-index:160;
  display:none; align-items:center; justify-content:center;
  background:rgba(4,2,1,.78); backdrop-filter:blur(6px);
}
#quit-overlay.show { display:flex; }
#quit-box { background:#120a02; border:1px solid #6a4010; border-radius:10px;
  padding:26px 30px; text-align:center; }
#quit-box p { font-size:14px; color:#c8a060; letter-spacing:.08em; margin-bottom:18px; }
.qbtns { display:flex; gap:12px; justify-content:center; }
.qbtns button { background:none; border:1px solid #5a3010; color:#9a6030;
  padding:8px 20px; font-size:12px; cursor:pointer; border-radius:4px; }
.qyes { border-color:#aa3010 !important; color:#cc5030 !important; }



/* ── WIN OVERLAY ── */
#win { position:fixed; inset:0; z-index:50; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  background:rgba(4,2,1,.84); backdrop-filter:blur(10px); }
#win.show { display:flex; }
#win-portrait-wrap { margin-bottom:14px; }
#win-portrait-wrap canvas { border-radius:50%; border:3px solid #6a4a20;
  box-shadow:0 0 30px rgba(200,150,50,.3); }
#win h2 { font-size:clamp(20px,5vw,36px); font-weight:300; letter-spacing:.1em; margin-bottom:6px; }
#win h2.p1{color:#ffaa33;text-shadow:0 0 28px #ff8800}
#win h2.p2{color:#33ddff;text-shadow:0 0 28px #00aacc}
#win h2.draw{color:#888}
#win-quote { font-size:12px; color:#8a6040; font-style:italic; max-width:270px;
  text-align:center; line-height:1.6; margin-bottom:6px; }
#win p { font-size:11px; color:#4a3010; letter-spacing:.18em; margin-bottom:22px; }
.win-btns { display:flex; flex-direction:column; gap:10px; align-items:center; width:100%; }
.win-btns button { background:none; border:1px solid #5a3a10; color:#9a6030;
  padding:12px 0; font-size:13px; cursor:pointer; border-radius:6px;
  width:220px; letter-spacing:.06em; transition:all .15s; }
.win-btns button:hover { border-color:#9a6030; background:rgba(150,80,20,.08); }
#btncheck { border-color:#3a6a3a; color:#6aaa6a; }
#btncheck:hover { border-color:#6aaa6a; background:rgba(50,120,50,.08); }

/* ── BACK TO RESULT BUTTON ── */
#back-btn {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:60;
  display:none;
  background:rgba(8,5,2,.96);
  border:2px solid #c87820;
  border-radius:10px;
  padding:16px 40px;
  font-size:15px;
  color:#c8a060;
  letter-spacing:.1em;
  cursor:pointer;
  white-space:nowrap;
  box-shadow:0 0 30px rgba(200,120,30,.4);
}
#back-btn.show { display:block; }

/* ── TAP OVERLAY GRID ── */
#tap-grid {
  position:fixed; inset:0; z-index:5;
  display:block; pointer-events:none;
}
.tap-cell {
  position:absolute;
  background:transparent;
  pointer-events:none;
}
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="mode-screen">
  <h1>立体四並べ</h1>
  <div class="sub">3D · CONNECT FOUR</div>
  <button class="mode-btn" onclick="startGame('pvp')">
    <div class="mode-icon">👥</div>
    <div class="mode-lbl"><span>二人対戦</span><span>プレイヤー同士で対戦</span></div>
  </button>
  <div class="char-card" onclick="startGame('cpu1')">
    <div class="char-portrait-wrap"><canvas id="cp1" width="56" height="56"></canvas></div>
    <div class="char-info">
      <div class="char-name">けんた（Lv.1）</div>
      <div class="char-lvl">小学5年生・元気いっぱい</div>
      <div class="char-desc">「ぼく、つよいんだよ！」<br>直感で来る元気な子</div>
    </div>
  </div>
  <div class="char-card" onclick="startGame('cpu2')">
    <div class="char-portrait-wrap"><canvas id="cp2" width="56" height="56"></canvas></div>
    <div class="char-info">
      <div class="char-name">あかり（Lv.2）</div>
      <div class="char-lvl">高校2年生・頭脳派</div>
      <div class="char-desc">「甘く見ないでよ」<br>守りと攻めを冷静に判断</div>
    </div>
  </div>
  <div class="char-card" onclick="startGame('cpu3')">
    <div class="char-portrait-wrap"><canvas id="cp3" width="56" height="56"></canvas></div>
    <div class="char-info">
      <div class="char-name">博士（Lv.3）</div>
      <div class="char-lvl">元チェス世界王者・80歳</div>
      <div class="char-desc">「フォッフォッフォ…」<br>数手先まで読む最強の賢者</div>
    </div>
  </div>
</div>

<!-- DICE OVERLAY -->
<div id="dice-overlay">
  <div id="dice-title">先手・後手を決めます</div>
  <div id="dice-row">
    <div class="die-wrap">
      <div class="die" id="d1">🎲</div>
      <div class="die-label">P1</div>
    </div>
    <div id="dice-vs">VS</div>
    <div class="die-wrap">
      <div class="die" id="d2">🎲</div>
      <div class="die-label" id="d2label">P2</div>
    </div>
  </div>
  <div id="dice-result"></div>
  <div id="dice-sub"></div>
  <button id="dice-go">ゲームスタート！</button>
</div>

<!-- GAME HUD -->
<div id="hud">
  <div style="display:flex;gap:10px;align-items:center">
    <div class="chip p1 on" id="c1"><div class="cdot"></div>P1</div>
    <span style="color:#2a1208;font-size:11px">VS</span>
    <div class="chip p2" id="c2"><div class="cdot"></div><span id="p2label">P2</span></div>
  </div>
  <span id="mode-label" style="font-size:10px;color:#4a2808;letter-spacing:.1em;"></span>
  <div style="font-size:10px;color:#3a2010;text-align:right;line-height:1.7">ドラッグ：回転<br>スクロール：ズーム</div>
</div>

<!-- CHARACTER BUBBLE -->
<div id="char-bubble">
  <div id="bubble-portrait"><canvas id="bpcanvas" width="44" height="44"></canvas></div>
  <div id="char-speech">…</div>
</div>

<!-- CPU THINKING -->
<div id="thinking">思考中…</div>


<!-- SELECTION STATUS -->
<div id="sel-status">もう一度タップで確定</div>

<!-- BOTTOM TOOLBAR -->
<div id="toolbar">
  <button id="mbtn">♪</button>
  <button id="voicebtn">🔊</button>
  <button id="btnview">視点リセット</button>
  <button id="btnreset">リセット</button>
  <button id="btnmode">モード選択</button>
  <button id="btnquit">ゲーム終了</button>
</div>

<!-- QUIT CONFIRM -->
<div id="quit-overlay">
  <div id="quit-box">
    <p>ゲームを終了しますか？</p>
    <div class="qbtns">
      <button class="qyes" id="qyes">終了する</button>
      <button id="qno">続ける</button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win">
  <div id="win-portrait-wrap"><canvas id="wpcanvas" width="88" height="88"></canvas></div>
  <h2 id="wt"></h2>
  <div id="win-quote"></div>
  <p id="wp"></p>
  <div class="win-btns">
    <button id="btncheck">盤面を確認</button>
    <button id="btnagain">もう一度</button>
    <button id="btnmode2">モード選択</button>
  </div>
</div>

<!-- BACK TO RESULT -->
<button id="back-btn">← 結果に戻る</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

function drawKenta(cv,S){

  c.beginPath(); c.ellipse(S*.73,S*.39,S*.045,S*.062,0,0,Math.PI*2); c.fill();

  c.beginPath(); c.moveTo(S*.538,S*.348); c.quadraticCurveTo(S*.605,S*.325,S*.672,S*.345); c.stroke();
  c.strokeStyle='#2a1200'; c.lineWidth=S*.028;
  c.beginPath(); c.moveTo(S*.335,S*.308); c.quadraticCurveTo(S*.395,S*.284,S*.455,S*.308); c.stroke();
  c.beginPath(); c.moveTo(S*.545,S*.308); c.quadraticCurveTo(S*.605,S*.284,S*.665,S*.308); c.stroke();

}

function drawAkari(cv,S){
  var c=cv.getContext('2d'); cv.width=S; cv.height=S; c.clearRect(0,0,S,S);
  c.save(); c.beginPath(); c.arc(S/2,S/2,S/2,0,Math.PI*2); c.clip();
  var bg=c.createLinearGradient(0,0,0,S); bg.addColorStop(0,'#ffe8f8'); bg.addColorStop(1,'#f0b8d8');
  c.fillStyle=bg; c.fillRect(0,0,S,S);
  c.fillStyle='#1a2565'; c.beginPath(); c.ellipse(S*.5,S*.9,S*.36,S*.25,0,0,Math.PI*2); c.fill();
  c.fillStyle='#e8eef8'; c.beginPath(); c.moveTo(S*.38,S*.65); c.lineTo(S*.5,S*.72); c.lineTo(S*.62,S*.65); c.lineTo(S*.66,S*.6); c.lineTo(S*.5,S*.68); c.lineTo(S*.34,S*.6); c.closePath(); c.fill();
  c.fillStyle='#cc1133'; c.beginPath(); c.moveTo(S*.5,S*.7); c.lineTo(S*.43,S*.62); c.lineTo(S*.5,S*.65); c.lineTo(S*.57,S*.62); c.closePath(); c.fill();
  c.fillStyle='#f8e0c8'; c.fillRect(S*.42,S*.58,S*.16,S*.1);
  var hg=c.createRadialGradient(S*.46,S*.33,S*.01,S*.5,S*.37,S*.27); hg.addColorStop(0,'#fff5e8'); hg.addColorStop(1,'#f8ddbe');
  c.fillStyle=hg; c.beginPath(); c.ellipse(S*.5,S*.37,S*.235,S*.27,0,0,Math.PI*2); c.fill();
  c.fillStyle='#2e1600';
  c.beginPath(); c.ellipse(S*.5,S*.18,S*.255,S*.14,0,Math.PI,Math.PI*2); c.fill();

// ── SPEECH SYNTHESIS ──
var speechEnabled = true;
var speechReady = false;
var speechQueue = [];

// Android requires voices to load after user gesture
function initSpeech(){
  if(!window.speechSynthesis) return;
  // Trigger voice list load
  var voices = window.speechSynthesis.getVoices();
  if(voices.length > 0){
    speechReady = true;
  } else {
    window.speechSynthesis.onvoiceschanged = function(){
      speechReady = true;
      // Flush queued speech
      if(speechQueue.length > 0){
        var item = speechQueue.shift();
        speechQueue = [];
        _speak(item.text, item.charType);
      }
    };
  }
  // Warm up with silent utterance (required on some Android browsers)
  var warmup = new SpeechSynthesisUtterance('');
  warmup.volume = 0;
  window.speechSynthesis.speak(warmup);
}

function _speak(text, charType){
  if(!window.speechSynthesis) return;
  try{ window.speechSynthesis.cancel(); }catch(e){}
  var msg = new SpeechSynthesisUtterance(text);
  // Find Japanese voice
  var voices = window.speechSynthesis.getVoices();
  var jaVoice = null;
  for(var i=0;i<voices.length;i++){
    if(voices[i].lang && voices[i].lang.indexOf('ja')===0){
      jaVoice = voices[i]; break;
    }
  }
  if(jaVoice) msg.voice = jaVoice;
  msg.lang = 'ja-JP';
  msg.volume = 1.0;
  if(charType==='kenta'){
    msg.rate=1.2; msg.pitch=1.5;
  } else if(charType==='akari'){
    msg.rate=1.0; msg.pitch=1.3;
  } else if(charType==='hakase'){
    msg.rate=0.82; msg.pitch=0.7;
  } else {
    msg.rate=1.0; msg.pitch=1.0;
  }
  window.speechSynthesis.speak(msg);
}

function speak(text, charType){
  if(!speechEnabled || !window.speechSynthesis) return;
  if(speechReady){
    _speak(text, charType);
  } else {
    speechQueue = [{text:text, charType:charType}];
  }
}

// Init on first user interaction
document.addEventListener('touchend', function(){
  initSpeech();
}, {once:true, passive:true});
document.addEventListener('mouseup', function(){
  initSpeech();
}, {once:true});

function mkSq(c,d){ d=d||.5; var r=new Float32Array(32),im=new Float32Array(32); for(var k=1;k<32;k++) im[k]=(2/(k*Math.PI))*Math.sin(Math.PI*k*d); return c.createPeriodicWave(r,im,{disableNormalization:true}); }

}

// Find nearest column to screen point, average across all layers
function cellAtPoint(x,y){
  var bestR=-1,bestC=-1,bestDist=Infinity;
  for(var ri2=0;ri2<ROWS;ri2++){
    for(var ci2=0;ci2<COLS;ci2++){
      // Average screen position across all 4 layers for this column
      var ax=0,ay=0;
      for(var zi3=0;zi3<LAYERS;zi3++){
        var p=cellPos(zi3,ri2,ci2).clone().project(camera);
        ax+=(p.x+1)/2*innerWidth;
        ay+=(-p.y+1)/2*innerHeight;
      }
      ax/=LAYERS; ay/=LAYERS;
      var d=Math.sqrt((x-ax)*(x-ax)+(y-ay)*(y-ay));
      if(d<bestDist){ bestDist=d; bestR=ri2; bestC=ci2; }
    }
  }
  if(bestR>=0) return {r:bestR,c:bestC,dist:bestDist};
  return null;
}

// Get screen position of selected column center (average of all layers)
function selColScreenPos(){
  if(!selPos) return null;
  var ax=0,ay=0;
  for(var zi3=0;zi3<LAYERS;zi3++){
    var p=cellPos(zi3,selPos.r,selPos.c).clone().project(camera);
    ax+=(p.x+1)/2*innerWidth;
    ay+=(-p.y+1)/2*innerHeight;
  }
  return {x:ax/LAYERS, y:ay/LAYERS};
}

function updateTapOverlay(){
  // Project all 4 layers of each column to screen, find bounding box
  for(var ri2=0;ri2<ROWS;ri2++){
    for(var ci2=0;ci2<COLS;ci2++){
      var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      for(var zi3=0;zi3<LAYERS;zi3++){
        var p=cellPos(zi3,ri2,ci2).clone();
        p.project(camera);
        var sx=(p.x+1)/2*innerWidth;
        var sy=(-p.y+1)/2*innerHeight;
        if(sx<minX)minX=sx; if(sx>maxX)maxX=sx;
        if(sy<minY)minY=sy; if(sy>maxY)maxY=sy;
      }
      var pad=SP*18; // generous padding in screen pixels
      var cell=tapCells[ri2+','+ci2];
      if(cell){
        cell.style.left=(minX-pad)+'px';
        cell.style.top=(minY-pad)+'px';
        cell.style.width=(maxX-minX+pad*2)+'px';
        cell.style.height=(maxY-minY+pad*2)+'px';
      }
    }
  }
}

// ── Win lines ──
var WIN_LINES=(function(){
  var L=[];
  for(var z=0;z<4;z++) for(var r=0;r<4;r++) L.push([[z,r,0],[z,r,1],[z,r,2],[z,r,3]]);
  for(var z=0;z<4;z++) for(var c=0;c<4;c++) L.push([[z,0,c],[z,1,c],[z,2,c],[z,3,c]]);
  for(var z=0;z<4;z++){ L.push([[z,0,0],[z,1,1],[z,2,2],[z,3,3]]); L.push([[z,0,3],[z,1,2],[z,2,1],[z,3,0]]); }
  for(var r=0;r<4;r++) for(var c=0;c<4;c++) L.push([[0,r,c],[1,r,c],[2,r,c],[3,r,c]]);
  for(var r=0;r<4;r++){ L.push([[0,r,0],[1,r,1],[2,r,2],[3,r,3]]); L.push([[0,r,3],[1,r,2],[2,r,1],[3,r,0]]); }
  for(var c=0;c<4;c++){ L.push([[0,0,c],[1,1,c],[2,2,c],[3,3,c]]); L.push([[0,3,c],[1,2,c],[2,1,c],[3,0,c]]); }
  L.push([[0,0,0],[1,1,1],[2,2,2],[3,3,3]]); L.push([[0,0,3],[1,1,2],[2,2,1],[3,3,0]]);
  L.push([[0,3,0],[1,2,1],[2,1,2],[3,0,3]]); L.push([[0,3,3],[1,2,2],[2,1,1],[3,0,0]]);
  return L;
})();
function checkWinOn(b,p){ for(var i=0;i<WIN_LINES.length;i++) if(WIN_LINES[i].every(function(pt){return b[pt[0]][pt[1]][pt[2]]===p;})) return WIN_LINES[i]; return null; }
function checkWin(){ return checkWinOn(board,player); }

// ── CPU AI ──
function getPlayable(){ var cols=[]; for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) if(lowestEmpty(r,c)>=0) cols.push({r:r,c:c}); return cols; }
function cloneB(){ var b=makeBoard(); for(var z=0;z<LAYERS;z++) for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) b[z][r][c]=board[z][r][c]; return b; }
function loE(b,r,c){ for(var z=0;z<LAYERS;z++) if(b[z][r][c]===0) return z; return -1; }
function isWin(b,r,c,p){ var z=loE(b,r,c); if(z<0) return false; b[z][r][c]=p; var w=checkWinOn(b,p)!==null; b[z][r][c]=0; return w; }
function evalB(b,p){ var s=0; WIN_LINES.forEach(function(ln){ var m=0,o=0; ln.forEach(function(pt){var v=b[pt[0]][pt[1]][pt[2]];if(v===p)m++;else if(v!==0)o++;}); if(!o){if(m===3)s+=100;else if(m===2)s+=10;else if(m===1)s+=1;} var m2=0,o2=0; ln.forEach(function(pt){var v=b[pt[0]][pt[1]][pt[2]];if(v===(p===1?2:1))m2++;else if(v!==0)o2++;}); if(!o2){if(m2===3)s-=110;else if(m2===2)s-=11;else if(m2===1)s-=1;} }); return s; }
function minimax(b,d,isMax,al,be){ if(checkWinOn(b,2)) return 1000+d; if(checkWinOn(b,1)) return -1000-d; if(d===0) return evalB(b,2); var cols=[]; for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) if(loE(b,r,c)>=0) cols.push({r:r,c:c}); if(!cols.length) return 0; var p=isMax?2:1,val=isMax?-Infinity:Infinity; for(var i=0;i<cols.length;i++){var col=cols[i],z=loE(b,col.r,col.c);if(z<0)continue;b[z][col.r][col.c]=p;var ch2=minimax(b,d-1,!isMax,al,be);b[z][col.r][col.c]=0;if(isMax){if(ch2>val)val=ch2;if(val>al)al=val;}else{if(ch2<val)val=ch2;if(val<be)be=val;}if(be<=al)break;} return val; }

function cpuMove(){
  var cols=getPlayable(); if(!cols.length) return null;
  var b=cloneB();
  if(gameMode==='cpu1'){
    var rr=Math.random();
    if(rr<.1) for(var i=0;i<cols.length;i++) if(isWin(b,cols[i].r,cols[i].c,2)) return cols[i];
    if(rr<.35) for(var i=0;i<cols.length;i++) if(isWin(b,cols[i].r,cols[i].c,1)) return cols[i];
    return cols[Math.floor(Math.random()*cols.length)];
  }
  for(var i=0;i<cols.length;i++) if(isWin(b,cols[i].r,cols[i].c,2)) return cols[i];
  for(var i=0;i<cols.length;i++) if(isWin(b,cols[i].r,cols[i].c,1)) return cols[i];
  if(gameMode==='cpu2'){
    var best=cols[0],bsc=-Infinity;
    cols.forEach(function(col){var z=loE(b,col.r,col.c);if(z<0)return;b[z][col.r][col.c]=2;var s=evalB(b,2)+Math.random()*15;b[z][col.r][col.c]=0;if(s>bsc){bsc=s;best=col;}});
    return best;
  }
  var bc=cols[0],bv=-Infinity;
  cols.forEach(function(col){var z=loE(b,col.r,col.c);if(z<0)return;b[z][col.r][col.c]=2;var v=minimax(b,4,false,-Infinity,Infinity);b[z][col.r][col.c]=0;if(v>bv){bv=v;bc=col;}});
  return bc;
}

// ── Place piece ──
function mset(m,z,r,c){ var p=cellPos(z,r,c); m.position.x=p.x; m.position.y=p.y; m.position.z=p.z; }

function placePiece(r,c){
  if(!board) return;
  var z=lowestEmpty(r,c); if(z<0) return;
  prevMesh.visible=false;

  var geo=new THREE.SphereGeometry(.82,32,32);
  var mat=new THREE.MeshPhongMaterial({color:player===1?0xffaa33:0x33ddff,emissive:player===1?0x441800:0x002244,shininess:180,specular:new THREE.Color(0xffffff)});
  var ball=new THREE.Mesh(geo,mat); ball.castShadow=true; ball.userData={z:z,r:r,c:c};
  mset(ball,z,r,c); scene.add(ball); placed.push(ball);
  sndPlace(player);
  // Drop animation
  var ty=ball.position.y, sy=topY+POLE_H+.5; ball.position.y=sy; var t=0;
  (function drop(){ t+=.09; var e=1-Math.pow(1-Math.min(t,1),3); ball.position.y=sy+(ty-sy)*e; if(t<1) requestAnimationFrame(drop); else ball.position.y=ty; })();

  board[z][r][c]=player;

  var wl=checkWin();
  if(wl){
    over=true;
    winBalls=wl.map(function(pt){ return placed.find(function(m){ return m.userData.z===pt[0]&&m.userData.r===pt[1]&&m.userData.c===pt[2]; }); }).filter(Boolean);
    refreshBar();
    var winner=player;
    // Show win screen after short delay
    setTimeout(function(){
      sndWin();
      var ch=CHARS[gameMode],wpc=document.getElementById('wpcanvas'); wpc.width=88; wpc.height=88;
      var h=document.getElementById('wt'),q=document.getElementById('win-quote'),wp2=document.getElementById('wp');
      if(gameMode!=='pvp'&&winner===2){
        if(ch.who==='kenta')drawKenta(wpc,88);else if(ch.who==='akari')drawAkari(wpc,88);else drawHakase(wpc,88);
        h.className='p2'; h.textContent=ch.name+' の勝利';
        var wline=ch.lines.win[Math.floor(Math.random()*ch.lines.win.length)];
        q.textContent='"'+wline+'"';

        q.textContent=''; wp2.textContent='4つ並べました';
      }
      document.getElementById('win').classList.add('show');
    }, 1000);
    return;
  }

  var draw=true; for(var rr2=0;rr2<ROWS&&draw;rr2++) for(var cc2=0;cc2<COLS&&draw;cc2++) if(lowestEmpty(rr2,cc2)>=0) draw=false;
  if(draw){
    over=true; refreshBar();
    setTimeout(function(){
      var x=document.getElementById('wpcanvas').getContext('2d'); x.font='60px serif'; x.textAlign='center'; x.fillText('🤝',44,70);
      document.getElementById('wt').className='draw'; document.getElementById('wt').textContent='引き分け';
      document.getElementById('win-quote').textContent=''; document.getElementById('wp').textContent='全マスが埋まりました';
      document.getElementById('win').classList.add('show');
    }, 800);
    return;
  }

  // Switch player
  player = player===1 ? 2 : 1;
  selPos = null;
  updateChips();

  if(isCpuTurn()){

    scheduleCpu();
  } else {

  }
}

function scheduleCpu(){
  cpuThinking=true;
  showSelStatus(null);
  document.getElementById('thinking').classList.add('show');
  if(Math.random()<.4) showBubble(gameMode,'think');
  setTimeout(function(){
    if(!over&&isCpuTurn()){

      document.getElementById('thinking').classList.remove('show');

    }
  }, 600+Math.random()*900);
}

// ── Selection: 1st tap = preview, 2nd tap = place ──
var lastSelTime=0;
function selectCol(r,c){
  if(over||isCpuTurn()||cpuThinking) return;
  if(!board) return;
  var z=lowestEmpty(r,c); if(z<0) return;
  // 2nd tap: only if enough time passed since selection (avoid double-fire)
  if(selPos && selPos.r===r && selPos.c===c){
    if(Date.now()-lastSelTime > 300){ doPlace(); } return;
  }
  lastSelTime=Date.now();
  // 1st tap (or different cell) → show preview
  selPos={z:z,r:r,c:c};
  prevMat.color.set(player===1?0xffee88:0x88eeff);
  prevMat.emissive.set(player===1?0x441800:0x002244);
  prevMat.opacity=0.6;
  mset(prevMesh,z,r,c);
  prevMesh.visible=true;
  prevMesh.scale.setScalar(1);
  prevMesh.renderOrder=999;
  prevMat.depthTest=false;
  showSelStatus('確定：もう一度タップ　変更：キャンセルボタン');
}

function clearSel(){
  selPos=null; prevMesh.visible=false; showSelStatus(null);
}

function doPlace(){
  if(!selPos||over) return;
  var r=selPos.r, c=selPos.c;
  selPos=null; prevMesh.visible=false;
  showSelStatus(null);
  placePiece(r,c);
}

// ── Raycasting ──
var raycaster=new THREE.Raycaster(), mouse2=new THREE.Vector2();
raycaster.params.Points={threshold:0.1};
function getCol(cx,cy){
  var rect=renderer.domElement.getBoundingClientRect();
  mouse2.x=((cx-rect.left)/rect.width)*2-1;
  mouse2.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  var hits=raycaster.intersectObjects(hitPlanes,false);
  for(var i=0;i<hits.length;i++){
    var ud=hits[i].object.userData;
    if(ud.r!==undefined && lowestEmpty(ud.r,ud.c)>=0){
      return {r:ud.r,c:ud.c};
    }
  }
  // Fallback: placed balls
  hits=raycaster.intersectObjects(placed,false);
  for(var i=0;i<hits.length;i++){
    var ud=hits[i].object.userData;
    if(ud.r!==undefined) return {r:ud.r,c:ud.c};
  }
  return null;
}


// ── Camera orbit ──
var orb={theta:.65,phi:.78,radius:24};
var tgt=new THREE.Vector3(0,SP*1.5,0);
function updateCam(){
  camera.position.set(
    tgt.x+orb.radius*Math.sin(orb.phi)*Math.sin(orb.theta),
    tgt.y+orb.radius*Math.cos(orb.phi),
    tgt.z+orb.radius*Math.sin(orb.phi)*Math.cos(orb.theta)
  );
  camera.lookAt(tgt);
}
function resetView(){ orb={theta:.65,phi:.78,radius:24}; updateCam(); }

// ── Input ──
// Simple state machine: tap1=select, tap2=confirm if same col, else reselect
var cvs=renderer.domElement;
var prevX=0, prevY=0;

// TOUCH — use touchstart only (fires exactly once per tap, no double-fire)
// Drag detection: if touchmove fires significantly, cancel the tap
var tDragging=false;
var tOriginX=0, tOriginY=0;

cvs.addEventListener('touchstart',function(e){
  // Only preventDefault if not touching a UI button
  var target=e.target;
  if(target && target.tagName==='BUTTON') return;
  e.preventDefault();
  tOriginX=e.touches[0].clientX;
  tOriginY=e.touches[0].clientY;
  tDragging=false;
  prevX=tOriginX; prevY=tOriginY;
},{passive:false});

cvs.addEventListener('touchmove',function(e){
  var cx=e.touches[0].clientX, cy=e.touches[0].clientY;
  var dx=cx-tOriginX, dy=cy-tOriginY;
  if(Math.abs(dx)>12||Math.abs(dy)>12) tDragging=true;
  var ddx=cx-prevX, ddy=cy-prevY;
  orb.theta-=ddx*.007;
  orb.phi=Math.max(.08,Math.min(Math.PI*.9,orb.phi+ddy*.007));
  prevX=cx; prevY=cy;
  updateCam();
},{passive:true});

cvs.addEventListener('touchend',function(e){
  if(tDragging||over||isCpuTurn()||cpuThinking) return;
  var t=e.changedTouches[0];
  // Ignore taps on UI buttons
  var endTarget=document.elementFromPoint(t.clientX,t.clientY);
  if(endTarget && (endTarget.tagName==='BUTTON'||endTarget.closest('button'))) return;

  var col=cellAtPoint(t.clientX,t.clientY);
  if(!col) return;

  // Check if tap is close to the currently selected column on screen
  var confirmed=false;
  if(selPos && Date.now()-lastSelTime>250){
    var sp=selColScreenPos();
    if(sp){
      var dx=t.clientX-sp.x, dy=t.clientY-sp.y;
      var distToSel=Math.sqrt(dx*dx+dy*dy);
      // Confirm if within 80px of selected column center on screen
      if(distToSel < 80){
        confirmed=true;
      }
    }
  }
  if(confirmed){
    doPlace();
  } else {
    selectCol(col.r,col.c);
  }
},{passive:true});


// MOUSE (desktop)
var mouseDown=false, mouseDragged=false;
cvs.addEventListener('mousedown',function(e){
  mouseDown=true; mouseDragged=false; prevX=e.clientX; prevY=e.clientY;
});
document.addEventListener('mousemove',function(e){
  if(!mouseDown) return;
  var dx=e.clientX-prevX, dy=e.clientY-prevY;
  if(Math.abs(dx)>4||Math.abs(dy)>4) mouseDragged=true;
  orb.theta-=dx*.007;
  orb.phi=Math.max(.08,Math.min(Math.PI*.9,orb.phi+dy*.007));
  prevX=e.clientX; prevY=e.clientY; updateCam();
});
document.addEventListener('mouseup',function(e){
  if(mouseDown&&!mouseDragged&&!over&&!isCpuTurn()&&!cpuThinking){
    if(selPos){
      doPlace();
    } else {
      var col=cellAtPoint(e.clientX,e.clientY);
      if(col) selectCol(col.r,col.c);
    }
  }
  mouseDown=false; mouseDragged=false;
});

cvs.addEventListener('wheel',function(e){
  orb.radius=Math.max(9,Math.min(46,orb.radius+e.deltaY*.025)); updateCam();
},{passive:true});

// ── Render loop ──
var clk=0;
(function loop(){
  requestAnimationFrame(loop);
  clk+=.016;
  if(prevMesh.visible) prevMesh.scale.setScalar(1+.045*Math.sin(clk*6));
  if(winBalls.length) winBalls.forEach(function(m){ if(m) m.scale.setScalar(1+.13*Math.sin(clk*4)); });
  renderer.render(scene,camera);
  updateTapOverlay();
})();

// ── Button wiring ──
// confirm bar removed — two-tap on canvas to place
document.getElementById('btnview').addEventListener('click',resetView);
document.getElementById('btnreset').addEventListener('click',function(){
  initGame();
  showDice(function(firstPlayer){
    player=firstPlayer; updateChips(); refreshBar();
    if(isCpuTurn()) scheduleCpu();
  });
});
document.getElementById('btnmode').addEventListener('click',showModeScreen);
document.getElementById('mbtn').addEventListener('click',toggleMusic);
document.getElementById('voicebtn').addEventListener('click',function(){
  speechEnabled=!speechEnabled;
  window.speechSynthesis.cancel();
  document.getElementById('voicebtn').textContent=speechEnabled?'🔊':'🔇';
});
document.getElementById('btnquit').addEventListener('click',function(){ document.getElementById('quit-overlay').classList.add('show'); });
document.getElementById('qno').addEventListener('click',function(){ document.getElementById('quit-overlay').classList.remove('show'); });
document.getElementById('qyes').addEventListener('click',function(){
  document.getElementById('quit-overlay').classList.remove('show');
  showModeScreen();
  try{ window.close(); }catch(e){}
});
document.getElementById('btncheck').addEventListener('click',function(){
  // Hide win screen completely so board is fully visible
  document.getElementById('win').classList.remove('show');
  document.getElementById('back-btn').classList.add('show');
});
document.getElementById('back-btn').addEventListener('click',function(){
  document.getElementById('win').classList.add('show');
  document.getElementById('back-btn').classList.remove('show');
});
document.getElementById('btnagain').addEventListener('click',function(){
  document.getElementById('win').classList.remove('show');
  initGame();
  showDice(function(firstPlayer){
    player=firstPlayer; updateChips(); refreshBar();
    if(gameMode!=='pvp') setTimeout(function(){showBubble(gameMode,'start');},400);
    if(isCpuTurn()) scheduleCpu();
  });
});
document.getElementById('btnmode2').addEventListener('click',showModeScreen);

// Start music on first interaction
// BGM: start exactly once, on the very first touchend anywhere on screen.
// musicStarted flag prevents any re-trigger.
var musicStarted = false;
function startMusicOnce(){
  if(musicStarted) return;
  musicStarted = true;
  startMusic();
}
document.addEventListener('touchend', function(){
  startMusicOnce();
}, {once:true, passive:true});
// Desktop fallback (no touch)
document.addEventListener('mouseup', function(){
  startMusicOnce();
}, {once:true});
window.addEventListener('resize',function(){ W=innerWidth; H=innerHeight; camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); });

updateCam();
</script>
